name: CI/CD Pipeline

on:
  push:
    branches: [main, testing, dev]
  pull_request:
    branches: [main, testing, dev]

jobs:
  # ── Prototype (Vite + React) ─────────────────────────────────────────────
  prototype-build:
    name: Prototype — Lint, Type Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prototypes/yong

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: prototypes/yong/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      - name: Build
        run: npx vite build

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: prototype-build-${{ github.sha }}
          path: prototypes/yong/dist
          retention-days: 7

  # ── Platform Monorepo (Next.js + pnpm + Turborepo) ──────────────────────
  platform-build:
    name: Platform — Type Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: real-estate-platform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('real-estate-platform/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check — platform app
        run: pnpm --filter @real-estate/platform type-check

      - name: Type check — database package
        run: pnpm --filter @platform/database type-check

      - name: Type check — shared package
        run: pnpm --filter @platform/shared type-check

      - name: Build — platform app
        run: pnpm --filter @real-estate/platform build

  # ── Compliance (prototype only, testing/main gates) ──────────────────────
  compliance:
    name: Compliance, Security & Edge Cases
    needs: prototype-build
    if: github.base_ref == 'testing' || github.ref == 'refs/heads/testing' || github.base_ref == 'main' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prototypes/yong

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: prototypes/yong/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (required for bundle checks)
        run: npx vite build

      - name: Run compliance suite
        run: npm run test:compliance

  # ── Deploy Preview (testing branch) ─────────────────────────────────────
  deploy-preview:
    name: Deploy to Preview
    needs: [prototype-build, platform-build, compliance]
    if: github.ref == 'refs/heads/testing' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download prototype artifact
        uses: actions/download-artifact@v4
        with:
          name: prototype-build-${{ github.sha }}
          path: dist

      - name: Deploy placeholder
        run: echo "Deploy to staging/preview environment. Configure hosting provider secrets to enable."

  # ── Deploy Production (main branch) ─────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: [prototype-build, platform-build, compliance]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download prototype artifact
        uses: actions/download-artifact@v4
        with:
          name: prototype-build-${{ github.sha }}
          path: dist

      - name: Deploy placeholder
        run: echo "Deploy to production environment. Configure hosting provider secrets to enable."
