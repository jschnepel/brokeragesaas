version: 1
applications:
  - appRoot: real-estate-platform/apps/platform
    frontend:
      phases:
        preBuild:
          commands:
            - cd ../../
            - corepack enable
            - pnpm install --frozen-lockfile
        build:
          commands:
            - cd apps/platform
            - pnpm build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
      buildSettings:
        env:
          NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
          NEXTAUTH_URL: "${NEXTAUTH_URL}"
          DATABASE_URL: "${DATABASE_URL}"
